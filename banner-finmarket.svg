<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f2027"/>
      <stop offset="50%" style="stop-color:#203a43"/>
      <stop offset="100%" style="stop-color:#2c5364"/>
    </linearGradient>

    <linearGradient id="logo" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Decorative finance chart -->
  <polyline
    fill="none"
    stroke="#4ade80"
    stroke-width="3"
    points="
    0,220
    100,200
    200,210
    300,170
    400,180
    500,140
    600,160
    700,120
    800,130
    900,90
    1000,100
    1100,60
    1200,80
    "
  />

  <!-- Logo -->
  <text x="100" y="130"
        font-size="70"
        font-family="Arial"
        fill="url(#logo)"
        font-weight="bold">
        FM
  </text>

  <!-- Title -->
  <text x="200" y="130"
        font-size="60"
        font-family="Arial"
        fill="white"
        font-weight="bold">
        FinMarket
  </text>

  <!-- Tagline -->
  <text x="200" y="170"
        font-size="28"
        font-family="Arial"
        fill="#cbd5f5">
        Software Marketplace for Financial Solutions
  </text>

  <!-- Feature icons text -->
  <text x="200" y="230"
        font-size="18"
        font-family="Arial"
        fill="#a5f3fc">
        Authentication • Marketplace • Secure Payments • Developer Tools
  </text>

</svg>
